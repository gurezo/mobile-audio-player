<ion-app>
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>Ionic Audio Demo</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content fullscreen>
    <ion-list>
      @for (track of tracks; track track.title) {
        <audio-track #audio [track]="track">
          <ion-item>
            <ion-thumbnail slot="start">
              <img [src]="track.art" alt="{{ track.title }}" />
            </ion-thumbnail>
            <ion-label>
              <h2>{{ track.title }}</h2>
              <p>{{ track.artist }}</p>
              <audio-track-progress-bar
                [duration]="true"
                [progress]="true"
                [audioTrack]="audio">
              </audio-track-progress-bar>
            </ion-label>
            <ion-button slot="end" fill="clear">
              <audio-track-play [audioTrack]="audio">
                <ion-spinner name="lines"></ion-spinner>
              </audio-track-play>
            </ion-button>
          </ion-item>
        </audio-track>
      }
    </ion-list>
  </ion-content>
</ion-app>
